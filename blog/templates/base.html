<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}BlogApp{% endblock %}</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{% url 'blog:post-list' %}">📝 BlogApp</a>
    <div class="navbar-nav ms-auto align-items-center">
      <a class="nav-link text-white" href="{% url 'blog:post-list' %}">Inicio</a>
      <a class="nav-link text-white" href="{% url 'blog:fotos-carousel' %}">Fotos</a>
      {% if user.is_authenticated %}
        <a class="nav-link text-white" href="{% url 'blog:post-create' %}">Nueva publicación</a>
        <span class="nav-link text-white-50 small">{{ user.username }}</span>
        <form action="{% url 'logout' %}" method="post" style="display:inline;">
          {% csrf_token %}
          <button type="submit" class="btn btn-link text-white text-decoration-none">Log Out</button>
        </form>
      {% else %}
        <a class="nav-link text-white" href="{% url 'login' %}">Iniciar sesión</a>
        <a class="nav-link text-white" href="{% url 'register' %}">Registrarse</a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container">

  {% if messages %}
    {% for m in messages %}
      <div class="alert alert-{{ m.tags }} alert-dismissible fade show" role="alert">
        {{ m }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endif %}

  {% block content %}{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmKnbJ8z63K61ydHfRrYNGXS+1M"
  crossorigin="anonymous"></script>
</body>
</html>

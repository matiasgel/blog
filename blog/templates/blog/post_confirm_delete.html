{% extends "blog/base.html" %}

{% block title %}Eliminar: {{ object.title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card border-danger">
      <div class="card-header bg-danger text-white">Confirmar eliminación</div>
      <div class="card-body">
        <p class="mb-1">¿Estás seguro de que querés eliminar la publicación?</p>
        <p class="fw-bold">« {{ object.title }} »</p>
        <p class="text-danger small">Esta acción no se puede deshacer.</p>

        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
            <a href="{% url 'blog:post-detail' object.pk %}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
